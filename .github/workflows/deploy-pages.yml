name: Deploy to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

# Silence the deprecation warning about Node 20 inside the actions themselves.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build for GitHub Pages
        env:
          # The repo name becomes the URL subpath, e.g. /veteranpro-companion/
          BASE_PATH: /${{ github.event.repository.name }}/
        run: npm run build

      - name: Copy index.html → 404.html (SPA fallback for client-side routes)
        run: cp dist/index.html dist/404.html

      - uses: actions/configure-pages@v5
        # Self-bootstrap Pages on the first run so the user doesn't have to flip the
        # repo setting manually. Requires the `pages: write` permission above.
        with:
          enablement: true

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
